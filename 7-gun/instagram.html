<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f0f2f5;
}

.container{
  width:900px;
  margin:100px auto;
  display:flex;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
}

.left{
  width:50%;
  padding:40px;
}

.left h1{
  font-size:30px;
}

.left span{
  color:#e1306c;
}

.right{
  width:50%;
  padding:40px;
  border-left:1px solid #ddd;
}

.right h2{
  margin-bottom:20px;
}

.right input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:#4a90e2;
  color:#fff;
  border:none;
  border-radius:20px;
}

p{
  text-align:center;
  margin:10px 0;
}

.box{
  border:1px solid #ccc;
  padding:10px;
  border-radius:20px;
  text-align:center;
  margin-top:10px;
}

.blue{
  border-color:#4a90e2;
  color:#4a90e2;
}

</style>
</head>

<body>

<div class="container">

  <div class="left">
    <h1>
      See everyday moments from your <span>close friends.</span>
    </h1>
  </div>

  <div class="right">
    <h2>Log into Instagram</h2>

    <input type="text" placeholder="Mobile number, username or email">
    <input type="password" placeholder="Password">

    <button>Log in</button>

    <p>Forgot password?</p>

    <div class="box">Log in with Facebook</div>
    <div class="box blue">Create new account</div>

  </div>

</div>

</body>
</html>
